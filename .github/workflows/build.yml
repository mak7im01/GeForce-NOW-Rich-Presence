name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: GeForceNOWRichPresence-Windows.zip
            asset_path: dist/GeForceNOWRichPresence-Windows.zip
          - os: ubuntu-latest
            artifact_name: GeForceNOWRichPresence-Linux.tar.gz
            asset_path: dist/GeForceNOWRichPresence-Linux.tar.gz
          - os: macos-latest
            artifact_name: GeForceNOWRichPresence-macOS.zip
            asset_path: dist/GeForceNOWRichPresence-macOS.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --clean --noconfirm GeForceNOWRichPresence.spec

      - name: Packaging - Windows
        if: matrix.os == 'windows-latest'
        run: |
          # 1. Compress folder contents into a ZIP file for silent updates
          cd dist/GeForceNOWRichPresence
          Compress-Archive -Path * -DestinationPath ../GeForceNOWRichPresence-Windows.zip
          cd ../..
          # 2. Compile Inno Setup Installer
          cp LICENSE dist/GeForceNOWRichPresence/LICENSE.txt
          cp LICENCE_es dist/GeForceNOWRichPresence/LICENSE_es.txt
          cp instalador.iss dist/GeForceNOWRichPresence/
          $raw_ver = "${{ github.ref_name }}"
          if ($raw_ver.StartsWith("v")) { $ver = $raw_ver.Substring(1) } else { $ver = $raw_ver }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /dAppVersion=$ver /Odist /FGeForcePresenceSetupv$ver dist/GeForceNOWRichPresence/instalador.iss
        shell: pwsh

      - name: Packaging - Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist/GeForceNOWRichPresence
          tar -czf ../GeForceNOWRichPresence-Linux.tar.gz .
        shell: bash

      - name: Packaging - macOS
        if: matrix.os == 'macos-latest'
        run: |
          cd dist/GeForceNOWRichPresence
          zip -r ../GeForceNOWRichPresence-macOS.zip .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_path }}

      - name: Upload Installer Artifact (Windows only)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: GeForceNOWRichPresence-Installer
          path: dist/GeForcePresenceSetupv*.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten folder structure for release
        run: |
          mkdir release-assets
          find dist-artifacts/ -name "*.zip" -exec cp {} release-assets/ \;
          find dist-artifacts/ -name "*.tar.gz" -exec cp {} release-assets/ \;
          find dist-artifacts/ -name "*.exe" -exec cp {} release-assets/ \;
          ls -R release-assets

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
